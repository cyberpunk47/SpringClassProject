<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Portal</title>
    <style>
        body {
            margin: 0;
        }

        .page {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            padding: 16px 24px;
            border-bottom: 1px solid black;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        nav {
            display: flex;
            align-items: center;
            gap: 14px;
            flex-wrap: wrap;
        }

        nav a {
            text-decoration: none;
        }

        .main-layout {
            flex: 1;
            display: flex;
            gap: 20px;
            padding: 20px;
            box-sizing: border-box;
             border-left: 2px solid black;
            border-right: 2px solid black;
        }

        .panel {
            border: 1px solid black;
            border-radius: 8px;
            padding: 16px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.06);
        }

        .left-panel,
        .right-panel {
            width: 220px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .middle-panel {
            flex: 1;
            border-left: 2px solid black;
            border-right: 2px solid black;
            padding: 0 20px;
        }

        footer {
            color: white;
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-top: 1px solid black;
        }

        div {
            border: 1px solid black;
        }

        footer ul {
            list-style: none;
            display: flex;
            gap: 14px;
            padding: 0;
            margin: 0 0 10px;
        }

        footer a {
            color: black;
            text-decoration: none;

        }
    </style>
</head>

<body>
    <div class="page">
        <header>
            <nav>
                <h2>School Portal</h2>
                <a href="/">Home</a>
                <a href="/about">About</a>
                <a href="/contact">Contact</a>
                <a href="/student">Student</a>
            </nav>
            <img th:src="@{/images.png}" alt="School Logo" width="60" height="60">
        </header>

        <div class="main-layout">
            <aside class="left-panel">
                <a href="/">Home</a>
                <a href="/about">About</a>
                <a href="/contact">Contact</a>
                <a href="/student">Student</a>
            </aside>

            <section class="middle-panel">
                <h3 th:text="${title}"></h3>
                <p th:text="${message}"></p>
                <p th:text="${Name}"></p>
                <p th:text="${RollNo}"></p>
                <p th:text="${Branch}"></p>
                <p th:text="${Semester}"></p>
                <p th:text="${CGPA}"></p>
            </section>

            <aside class="right-panel">
                <p th:text="${mission}"></p>
                <p th:text="${phone}"></p>
                <p th:text="${data3}"></p>
                <p th:text="${unique}"></p>
            </aside>
        </div>

        <footer>
            <ul>
                <li><a href="https://www.instagram.com"> <img th:src="@{/images.png}" alt="School Logo" width="60" height="60">Instagram
                    </a></li>
                <li><a href="https://www.facebook.com"> <img th:src="@{/images.png}" alt="School Logo" width="60" height="60">Facebook
                    </a></li>
                <li><a href="https://www.twitter.com"> <img th:src="@{/images.png}" alt="School Logo" width="60" height="60">Twitter
                    </a></li>
            </ul>
            <h3>
                Contact Us: <a href="mailto:info@schoolportal.com">info@schoolportal.com</a>
            </h3>
        </footer>
    </div>
</body>

</html>
